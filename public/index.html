<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Cache-bust favicon URLs (?v=). -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=<%= htmlWebpackPlugin.options.faviconV %>" />
    <link rel="icon" href="/favicon.ico?v=<%= htmlWebpackPlugin.options.faviconV %>" sizes="any" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png?v=<%= htmlWebpackPlugin.options.faviconV %>" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=<%= htmlWebpackPlugin.options.faviconV %>" />
    <!-- Redirect clean URLs to hash routes for GitHub Pages SPA -->
    <script>
      (function () {
        var path = location.pathname.replace(/\/$/, '') || '/';
        if (path !== '/' && !location.hash) {
          location.replace(location.origin + '/#' + path);
        }
      })();
    </script>
    <meta
      name="description"
      content="Taliba Sadiq, full stack developer (React, Next.js, Node). Portfolio: projects and contact."
    />
    <title>Taliba Sadiq | Full stack developer</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
