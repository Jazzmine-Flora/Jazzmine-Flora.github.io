name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # LTS; avoids Node 20 (deprecated on GitHub-hosted runners for JS actions).
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
        run: npm run build

      # Copy dist/ to repo root for GitHub Pages. Remove assets/ and projects/ first so old
      # Vite output does not accumulate stale files.
      - name: Copy built site to root
        run: |
          rm -rf assets projects
          cp -r dist/. .

      # Root index.html, 404.html, and assets/ are gitignored on dev branches so merges from
      # main do not reintroduce stale builds — but they must be committed on main for Pages.
      # Use -f so git stages those paths despite .gitignore.
      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f index.html 404.html
          if [ -d assets ]; then git add -f assets/; fi
          git add -A projects/ 2>/dev/null || true
          git add -f favicon.ico favicon.png apple-touch-icon.png .nojekyll 2>/dev/null || true
          # Loose images at repo root (if any); Vite puts hashed files under assets/
          git add -f *.png *.jpg *.jpeg *.ico *.gif *.svg *.webp 2>/dev/null || true
          git status
          if ! git diff --staged --quiet; then
            git commit -m "Deploy built site to root [skip ci]"
            git push origin main
          fi
