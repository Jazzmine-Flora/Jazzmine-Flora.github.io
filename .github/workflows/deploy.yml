name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Copy dist/ to repo root for GitHub Pages. Remove assets/ first so old Vite chunk hashes
      # are not left behind (plain cp merges and would accumulate stale files).
      - name: Copy built site to root
        run: |
          rm -rf assets
          cp -r dist/. .

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f bundle.js bundle.js.LICENSE.txt 2>/dev/null || true
          git add index.html 404.html
          git add -A assets/ 2>/dev/null || true
          git add favicon.ico favicon.png apple-touch-icon.png .nojekyll 2>/dev/null || true
          # Loose images at repo root (if any); Vite puts hashed files under assets/
          git add *.png *.jpg *.jpeg *.ico *.gif *.svg *.webp 2>/dev/null || true
          git status
          if ! git diff --staged --quiet; then
            git commit -m "Deploy built site to root [skip ci]"
            git push origin main
          fi
